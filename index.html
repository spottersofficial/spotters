<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEONGSU.NOW by Spotters - Real-time Trend Tracker</title>
    
    <link rel="icon" type="image/svg+xml" href="symbol-spottr-navy.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#1A1F71', point: '#007BFF', main: '#333333', sub: '#888888', base: '#F8F9FA' },
                    fontFamily: { sans: ['Montserrat', 'Pretendard', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    
    <style>
        :root { --color-primary-navy: #1A1F71; --color-point-blue: #007BFF; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-title { letter-spacing: -0.02em; }
        
        .rank-marker {
            width: 30px; height: 30px; background-color: var(--color-primary-navy); color: white;
            border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s;
            z-index: 10;
        }
        .rank-marker.top-rank { background-color: var(--color-point-blue); }
        .rank-marker:hover { transform: scale(1.1); z-index: 50; }
        .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { display: none !important; }
        .select-none { user-select: none; -webkit-user-select: none; }

        /* 디자인팀 요청: 텍스트 Halo(글로우) 효과 */
        .text-halo {
            text-shadow: 
                -1.5px -1.5px 0 #ffffff,  
                 1.5px -1.5px 0 #ffffff,
                -1.5px  1.5px 0 #ffffff,
                 1.5px  1.5px 0 #ffffff,
                 0px -1.5px 0 #ffffff,
                 0px  1.5px 0 #ffffff,
                -1.5px  0px 0 #ffffff,
                 1.5px  0px 0 #ffffff;
        }
    </style>
</head>
<body class="relative text-main font-sans antialiased">

    <div id="map" class="absolute inset-0 z-0"></div>

    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between">
        <div>
            <header class="pointer-events-auto h-[64px] bg-navy flex items-center justify-between px-4 shadow-md w-full relative z-[9999]">
                <div class="flex items-center gap-3">
                    <img src="logo-spottr-header.svg" alt="spottr" class="h-7 sm:h-8 object-contain cursor-pointer" onclick="handleLogoClick()">
                    
                    <div class="flex flex-col justify-center border-l border-white/20 pl-3">
                        <div class="relative">
                            <button onclick="toggleRegionMenu(event)" class="flex items-center gap-1 text-white text-[13px] font-bold hover:opacity-80 transition-opacity focus:outline-none">
                                <svg class="w-3.5 h-3.5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <span id="current-region-label">성수동</span>
                                <svg class="w-3 h-3 text-white/60 ml-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div id="region-dropdown" class="absolute top-[110%] left-0 mt-1 w-28 bg-white rounded-lg shadow-2xl hidden border border-gray-200 overflow-hidden z-[9999] pointer-events-auto">
                                <button onclick="changeRegion('성수', event)" class="w-full text-left px-4 py-3 text-[13px] font-extrabold text-navy hover:bg-gray-50 border-b border-gray-100">성수동</button>
                                <button onclick="changeRegion('노원', event)" class="w-full text-left px-4 py-3 text-[13px] font-extrabold text-navy hover:bg-gray-50">노원역</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 mt-0.5 text-[10px] text-white/70 font-bold brand-title tracking-wide">
                            <span class="text-point animate-pulse text-[8px]">●</span> LIVE
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex bg-white/10 rounded-full p-0.5 text-[10px] font-bold text-white/50">
                        <button class="bg-point text-white rounded-full px-2 py-1 shadow-sm transition-colors">KR</button>
                        <button class="px-2 py-1 hover:text-white transition-colors">EN</button>
                    </div>
                    <button class="text-white hover:opacity-80 transition-opacity focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </header>

            <div class="p-3 w-full max-w-md mx-auto pointer-events-auto relative z-40">
                <div id="tab-container" class="flex gap-2 overflow-x-auto no-scrollbar pb-1 select-none"></div>
                <div id="error-msg" class="hidden mt-2 bg-red-50 text-red-600 text-xs font-bold p-2 rounded-md border border-red-100 shadow-sm text-center"></div>
            </div>
        </div>

        <div class="w-full pb-4 pointer-events-auto flex flex-col items-center select-none relative z-40">
            <div id="cards-container" class="flex gap-3 px-4 w-full overflow-x-auto no-scrollbar snap-x snap-mandatory pb-2">
                <div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">
                    지역 데이터를 불러오는 중입니다...
                </div>
            </div>
            <div class="px-5 text-center mt-0.5 w-full max-w-md pointer-events-auto">
                <p class="text-[9.5px] text-gray-600 font-semibold tracking-tight leading-snug bg-white/80 backdrop-blur-md py-1.5 px-3 rounded-lg shadow-sm border border-white/50">
                    구글맵 평점과 네이버 실시간 검색량을 교차 검증하는 자동 로직으로,<br>
                    광고와 어뷰징이 배제된 <span class="text-point font-black">100% 리얼 핫플</span>만을 매일 선정합니다.
                </p>
                <p class="text-[9px] text-gray-500 font-medium mt-1.5 pb-1">
                    제휴 및 문의: <a href="mailto:admin@spottr.kr" class="font-bold text-navy hover:underline">admin@spottr.kr</a>
                </p>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden absolute inset-0 z-[10000] bg-base flex flex-col pointer-events-auto overflow-hidden">
        
        <div class="bg-navy px-6 py-4 flex justify-between items-center shadow-md shrink-0">
            <div>
                <h2 class="text-xl font-black text-white brand-title">spottr ADMIN DASHBOARD</h2>
                <p class="text-xs text-white/70 mt-1"><span id="admin-region-badge" class="bg-point text-white px-2 py-0.5 rounded mr-1">성수</span> 실시간 데이터 수동 보정</p>
            </div>
            <button onclick="document.getElementById('admin-dashboard').classList.add('hidden')" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded text-sm font-bold transition-colors">
                닫기 ✕
            </button>
        </div>

        <div class="px-6 py-3 bg-gray-100 border-b border-gray-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shrink-0">
            <div class="flex items-center gap-5 text-sm font-bold text-gray-700">
                <span class="text-navy">노출 카테고리 설정:</span>
                <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" value="식당/맛집" class="cat-checkbox w-4 h-4 text-point accent-point"> 식당/맛집</label>
                <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" value="카페/베이커리" class="cat-checkbox w-4 h-4 text-point accent-point"> 카페/베이커리</label>
                <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" value="쇼핑/문화" class="cat-checkbox w-4 h-4 text-point accent-point"> 쇼핑/문화</label>
            </div>
            <button onclick="saveCategoryConfig(this)" class="bg-gray-800 text-white text-xs px-4 py-2 rounded shadow-sm hover:bg-black transition-colors w-full sm:w-auto">설정 저장</button>
        </div>

        <div class="p-6 shrink-0 bg-white border-b border-gray-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div class="text-sm font-bold text-gray-800">
                수집 상태: <span id="admin-status" class="text-point">DB 연결 대기 중</span>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="btn-download-csv" onclick="downloadCSVFile()" class="hidden bg-green-600 text-white font-bold py-2.5 px-4 rounded shadow-sm hover:bg-green-700 transition-colors text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    CSV 다운로드
                </button>
                <button id="admin-update-btn" onclick="runBackendUpdate()" class="flex-1 sm:flex-none bg-point text-white font-bold py-2.5 px-6 rounded shadow-sm hover:bg-blue-600 transition-colors text-sm flex items-center justify-center gap-2">
                    선택 지역 데이터 재수집
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto p-6">
            <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">분류</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">순위</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">상호명</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">적용 키워드</th>
                            <th scope="col" class="px-6 py-3 text-right font-bold text-gray-500 uppercase tracking-wider">검색량</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">대표 이미지 URL</th>
                            <th scope="col" class="px-6 py-3 text-center font-bold text-gray-500 uppercase tracking-wider">수동 관리</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">
                                데이터를 불러오고 있습니다...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mdpqzcwamhzxybldvctr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_cBvE70DY9IG5SrNf01chWA_Yxn4pKSx';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        maptilersdk.config.apiKey = '0MQk1Z9FONFMeu7MkCDh';

        const ALL_CATEGORIES = ['식당/맛집', '카페/베이커리', '쇼핑/문화'];
        let activeCategories = [...ALL_CATEGORIES];
        
        let allPlacesData = []; 
        let map;
        let currentMarkers = [];
        let isDraggingCard = false;
        let currentRegion = '성수'; 

        let logoClickCount = 0;
        let logoClickTimer = null;
        let adminAccessToken = '';

        // 전철역 데이터 세팅
        const SUBWAY_DATA = {
            '성수': { name: '성수역', nameEn: 'Seongsu', lat: 37.5445888, lng: 127.0559664, color: '#00A84D' }, 
            '노원': { name: '노원역', nameEn: 'Nowon', lat: 37.656201, lng: 127.062820, color: '#00A4E3' } 
        };
        let subwayMarker = null;

        function handleLogoClick() {
            logoClickCount++;
            if (logoClickCount === 1) logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
            if (logoClickCount === 5) {
                clearTimeout(logoClickTimer);
                logoClickCount = 0;
                openAdminAuth();
            }
        }

        async function openAdminAuth() {
            if (adminAccessToken) {
                document.getElementById('admin-dashboard').classList.remove('hidden');
                return;
            }
            const adminId = prompt('[ADMIN] 관리자 ID(이메일):');
            if (!adminId) return;
            const adminPwd = prompt('[ADMIN] 관리자 비밀번호:');
            if (!adminPwd) return;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: adminId, password: adminPwd });
            if (error) return alert('인증 실패');
            adminAccessToken = data.session.access_token;
            document.getElementById('admin-dashboard').classList.remove('hidden');
        }

        function toggleRegionMenu(event) {
            event.stopPropagation();
            document.getElementById('region-dropdown').classList.toggle('hidden');
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('region-dropdown');
            if (!dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function changeRegion(region, event) {
            if(event) event.stopPropagation();
            currentRegion = region;
            document.getElementById('region-dropdown').classList.add('hidden');
            document.getElementById('current-region-label').innerText = region === '성수' ? '성수동' : '노원역';
            document.getElementById('admin-region-badge').innerText = region;
            
            if (map) {
                const coords = region === '성수' ? [127.0570, 37.5425] : [127.063338, 37.656367];
                map.flyTo({ center: coords, zoom: 15.5 });
                renderSubwayMarker(); // 지역 이동 시 마커 갱신
            }

            document.getElementById('admin-status').innerText = `[${region}] DB 로딩 중...`;
            document.getElementById('admin-status').className = 'text-point';
            document.getElementById('btn-download-csv').classList.add('hidden');

            allPlacesData = [];
            document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">${region} 데이터를 불러오는 중입니다...</div>`;
            document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${region} 데이터를 로드 중입니다...</td></tr>`;

            fetchPlaces();
        }

        // HTML/CSS 방식의 전철역 마커 생성 함수
        function renderSubwayMarker() {
            if (subwayMarker) subwayMarker.remove();
            
            const data = SUBWAY_DATA[currentRegion];
            if (!data || !map) return;

            const el = document.createElement('div');
            el.className = 'flex flex-col items-center select-none pointer-events-none z-0 opacity-90';
            
            el.innerHTML = `
                <div class="relative w-[22px] h-[22px] flex items-center justify-center drop-shadow-sm">
                    <img src="spottr-subway.svg" alt="subway" class="w-full h-full object-contain">
                    <div class="absolute -bottom-0.5 -right-0.5 w-[9px] h-[9px] rounded-full border-[1.5px] border-white shadow-sm" style="background-color: ${data.color};"></div>
                </div>
                <div class="mt-1 flex flex-col items-center leading-tight">
                    <span class="text-[12px] font-bold text-[#333333] text-halo tracking-tight">${data.name}</span>
                    <span class="text-[9.5px] font-medium text-[#333333] text-halo font-sans brand-title">${data.nameEn}</span>
                </div>
            `;

            subwayMarker = new maptilersdk.Marker({ element: el, anchor: 'center' })
                .setLngLat([data.lng, data.lat])
                .addTo(map);
        }

        function initMap() {
            const coords = currentRegion === '성수' ? [127.0570, 37.5425] : [127.063338, 37.656367];
            map = new maptilersdk.Map({
                container: 'map',
                style: "dataviz-light",
                center: coords,
                zoom: 15.5,
                controls: false
            });

            map.on('style.load', () => {
                renderSubwayMarker(); // 초기 로드 시 마커 렌더링
            });
        }

        async function fetchPlaces() {
            try {
                if(!map) initMap();
                
                const { data, error } = await supabaseClient
                    .from('places')
                    .select('*')
                    .eq('region', currentRegion);

                if (error) throw error;
                
                if (!data || data.length === 0 || data.filter(d => d.no !== 0).length === 0) {
                     document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">데이터가 없습니다. 우측 상단 번개 로고를 5번 눌러 수집해주세요.</div>`;
                     allPlacesData = [];
                     updateMapMarkers([]);
                     renderAdminTableFromData(); 
                     return;
                }

                const configRow = data.find(d => d.no === 0 && d.name === 'CONFIG');
                if (configRow && configRow.extracted_kw) {
                    activeCategories = configRow.extracted_kw.split(',').map(s => s.trim());
                } else {
                    activeCategories = [...ALL_CATEGORIES];
                }

                allPlacesData = data.filter(d => d.no !== 0).sort((a, b) => {
                    if (a.type < b.type) return -1;
                    if (a.type > b.type) return 1;
                    return b.trend_score - a.trend_score;
                });

                renderCategoryTabs();
                updateAdminCategoryCheckboxes();
                renderAdminTableFromData(); 
                document.getElementById('admin-status').innerText = `[${currentRegion}] DB 로드 완료`;
                document.getElementById('admin-status').className = 'text-green-600 font-bold';

                if (allPlacesData.length > 0) {
                    document.getElementById('btn-download-csv').classList.remove('hidden');
                }

                if (activeCategories.length > 0) {
                    switchTab(activeCategories[0]);
                } else {
                    document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">활성화된 카테고리가 없습니다. 관리자 모드에서 노출 카테고리를 체크해주세요.</div>`;
                    updateMapMarkers([]);
                }
            } catch (error) {
                console.error('Data Error:', error.message);
                alert(`🚨 DB 데이터를 불러오지 못했습니다.\n원인: ${error.message}\n\n※ Supabase 설정(region 컬럼 추가 및 RLS 해제)을 다시 한번 확인해주세요.`);
                document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-red-500 bg-white py-4 rounded-xl shadow-sm border border-red-100">오류가 발생했습니다: ${error.message}</div>`;
                document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-red-500 font-medium">데이터 로드 실패: ${error.message}</td></tr>`;
            }
        }

        function renderCategoryTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            
            activeCategories.forEach(cat => {
                const icon = cat.includes('식당') ? '🍔' : cat.includes('카페') ? '☕' : '🛍️';
                const safeId = 'tab-' + cat.replace(/[\/\s]/g, '');
                
                container.innerHTML += `
                    <button onclick="switchTab('${cat}')" id="${safeId}" class="btn-tab btn-inactive px-4 py-2 rounded-full text-[12px] font-bold shadow-sm flex items-center gap-1 whitespace-nowrap">
                        ${icon} ${cat}
                    </button>
                `;
            });
        }

        function updateAdminCategoryCheckboxes() {
            document.querySelectorAll('.cat-checkbox').forEach(cb => {
                cb.checked = activeCategories.includes(cb.value);
            });
        }

        async function saveCategoryConfig(btnElement) {
            btnElement.innerText = '저장 중...';
            btnElement.disabled = true;

            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCats = Array.from(checkboxes).map(cb => cb.value).join(',');

            const { data } = await supabaseClient.from('places').select('id').eq('no', 0).eq('region', currentRegion);
            let opError;

            if (data && data.length > 0) {
                const { error } = await supabaseClient.from('places').update({ extracted_kw: selectedCats }).eq('no', 0).eq('region', currentRegion);
                opError = error;
            } else {
                const { error } = await supabaseClient.from('places').insert({
                    no: 0, region: currentRegion, name: 'CONFIG', extracted_kw: selectedCats, 
                    trend_score: 0, lat: 0, lng: 0, type: 'config', status: 'config'
                });
                opError = error;
            }

            if (opError) {
                alert('설정 저장 실패: ' + opError.message);
                btnElement.disabled = false;
                btnElement.innerText = '설정 저장';
            } else {
                btnElement.innerText = '완료 ✔';
                btnElement.classList.replace('bg-gray-800', 'bg-green-600');
                setTimeout(() => {
                    btnElement.innerText = '설정 저장';
                    btnElement.classList.replace('bg-green-600', 'bg-gray-800');
                    btnElement.disabled = false;
                }, 2000);
                fetchPlaces(); 
            }
        }

        function switchTab(selectedCategory) {
            activeCategories.forEach(cat => {
                const safeId = 'tab-' + cat.replace(/[\/\s]/g, '');
                const tabEl = document.getElementById(safeId);
                if (tabEl) {
                    if (cat === selectedCategory) {
                        tabEl.className = 'btn-tab btn-active px-4 py-2 rounded-full text-[12px] font-bold shadow-md flex items-center gap-1 whitespace-nowrap';
                    } else {
                        tabEl.className = 'btn-tab btn-inactive px-4 py-2 rounded-full text-[12px] font-bold shadow-sm flex items-center gap-1 whitespace-nowrap';
                    }
                }
            });

            const filteredPlaces = allPlacesData.filter(p => p.type === selectedCategory).slice(0, 10);
            updateMapMarkers(filteredPlaces);
            renderBottomCards(filteredPlaces);
        }

        function updateMapMarkers(places) {
            if (!map) return;
            currentMarkers.forEach(marker => marker.remove());
            currentMarkers = [];
            if (places.length === 0) return;

            const bounds = new maptilersdk.LngLatBounds();
            places.forEach((place, index) => {
                const el = document.createElement('div');
                const isTop3 = index < 3;
                el.className = `rank-marker ${isTop3 ? 'top-rank' : ''}`;
                el.innerHTML = `${index + 1}`;
                
                el.onclick = () => {
                    const card = document.getElementById(`card-${index}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        map.flyTo({ center: [place.lng, place.lat], zoom: 17.5 });
                    }
                };
                const marker = new maptilersdk.Marker({ element: el }).setLngLat([place.lng, place.lat]).addTo(map);
                currentMarkers.push(marker);
                bounds.extend([place.lng, place.lat]);
            });
            map.fitBounds(bounds, { padding: { top: 150, bottom: 250, left: 50, right: 50 }, maxZoom: 16.5, duration: 1000 });
        }

        function renderBottomCards(places) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            if (places.length === 0) return;

            places.forEach((place, index) => {
                const rankBadge = index < 3 ? 'bg-point text-white' : 'bg-navy text-white';
                const searchKw = place.extracted_kw ? place.extracted_kw : `${currentRegion} ${place.name}`;
                const blogLink = place.youtube_vid ? place.youtube_vid : `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(searchKw)}`;
                const imageSrc = place.custom_img ? place.custom_img : `https://picsum.photos/seed/${place.id}/400/300`;

                const cardHtml = `
                    <div id="card-${index}" onclick="panToMap(${place.lat}, ${place.lng})" class="snap-center shrink-0 w-[80%] sm:w-72 bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden flex flex-col cursor-pointer transform transition hover:-translate-y-1">
                        <div class="h-24 bg-gray-200 relative">
                            <img src="${imageSrc}" alt="${place.name}" class="absolute inset-0 w-full h-full object-cover">
                            <div class="absolute top-2 left-2 ${rankBadge} brand-title px-2.5 py-1 rounded-md text-[12px] font-bold shadow-md">
                                ${index + 1}위
                            </div>
                        </div>
                        
                        <div class="px-3 py-2.5 flex flex-col gap-1">
                            <h3 class="font-extrabold text-[15px] text-gray-900 truncate">${place.name}</h3>
                            <div class="flex justify-between items-end mt-1">
                                <div class="text-[10px] font-semibold text-sub">
                                    <span class="text-point font-bold brand-title mr-0.5">최근 30일 검색량</span> <span class="text-gray-900 font-black">${Number(place.trend_score).toLocaleString()}건</span>
                                </div>
                                <a href="${blogLink}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();"
                                   class="text-[10px] font-bold bg-gray-100 text-gray-800 px-2.5 py-1.5 rounded hover:bg-gray-200 transition-colors">
                                   네이버 블로그 ↗
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            initDragScroll(container);
        }

        function panToMap(lat, lng) {
            if (isDraggingCard) return; 
            if (!map) return;
            map.flyTo({ center: [lng, lat], zoom: 17.5, essential: true, offset: [0, 80] });
        }

        function initDragScroll(slider) {
            let isDown = false;
            let startX;
            let scrollLeft;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; isDraggingCard = false; slider.classList.add('cursor-grabbing');
                startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mouseup', () => {
                isDown = false; slider.classList.remove('cursor-grabbing');
                setTimeout(() => isDraggingCard = false, 50);
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault(); isDraggingCard = true; 
                const x = e.pageX - slider.offsetLeft;
                slider.scrollLeft = scrollLeft - (x - startX) * 1.5; 
            });
        }

        async function runBackendUpdate() {
            const btn = document.getElementById('admin-update-btn');
            const statusLabel = document.getElementById('admin-status');
            const tbody = document.getElementById('admin-table-body');
            const btnCsv = document.getElementById('btn-download-csv');
            
            btn.disabled = true;
            btn.classList.replace('bg-point', 'bg-gray-400');
            btnCsv.classList.add('hidden');
            statusLabel.innerText = `[${currentRegion}] 수집 및 분석 중... (최대 2분 소요)`;
            statusLabel.className = 'text-orange-500 animate-pulse font-bold';
            tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${currentRegion} 데이터를 수집 중입니다...</td></tr>`;

            try {
                const response = await fetch('https://mdpqzcwamhzxybldvctr.supabase.co/functions/v1/update-hotspots', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ region: currentRegion })
                });
                if (!response.ok) throw new Error((await response.json()).error);
                
                statusLabel.innerText = `[${currentRegion}] 데이터 수집 완료`;
                statusLabel.className = 'text-green-600 font-bold';
                
                fetchPlaces();
            } catch (error) {
                alert('🚨 업데이트 실패: ' + error.message);
                statusLabel.innerText = '오류 발생';
                statusLabel.className = 'text-red-600 font-bold';
            } finally {
                btn.disabled = false; btn.classList.replace('bg-gray-400', 'bg-point');
            }
        }

        function renderAdminTableFromData() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            
            if (allPlacesData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${currentRegion} 데이터가 없습니다. 우측 상단의 '선택 지역 데이터 재수집' 버튼을 누르세요.</td></tr>`;
                return;
            }

            allPlacesData.forEach(place => {
                const trHtml = `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-medium">${place.type}</td>
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-bold">${place.no}위</td>
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 truncate max-w-[120px]">${place.name}</td>
                        <td class="px-6 py-3 whitespace-nowrap"><input type="text" class="kw-input border border-gray-300 rounded px-2 py-1 w-28 text-sm text-blue-600 font-semibold focus:outline-none focus:border-point" value="${place.extracted_kw || ''}"></td>
                        <td class="px-6 py-3 whitespace-nowrap text-right"><input type="number" class="search-input border border-gray-300 rounded px-2 py-1 w-20 text-sm text-right font-bold text-point focus:outline-none focus:border-point" value="${place.trend_score || 0}"></td>
                        <td class="px-6 py-3 whitespace-nowrap"><input type="text" class="img-input border border-gray-300 rounded px-2 py-1 w-48 text-sm text-gray-600 focus:outline-none focus:border-point" value="${place.custom_img || ''}" placeholder="URL 붙여넣기"></td>
                        <td class="px-6 py-3 whitespace-nowrap text-center"><button onclick="saveManualEdits('${place.name.replace(/'/g, "\\'")}', this)" class="bg-gray-700 text-white text-xs px-3 py-1.5 rounded shadow-sm hover:bg-black transition-colors">DB 반영</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', trHtml);
            });
        }

        function downloadCSVFile() {
            if (allPlacesData.length === 0) return;
            let csv = "분류,순위,상호명,적용키워드,검색량,대표이미지URL\n";
            allPlacesData.forEach(p => {
                csv += `${p.type},${p.no},"${p.name}","${p.extracted_kw || ''}",${p.trend_score},"${p.custom_img || ''}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `spottr_ranking_${currentRegion}_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        async function saveManualEdits(placeName, btnElement) {
            const tr = btnElement.closest('tr');
            btnElement.innerText = '저장...'; btnElement.disabled = true;

            const { error } = await supabaseClient.from('places').update({ 
                extracted_kw: tr.querySelector('.kw-input').value, 
                trend_score: parseInt(tr.querySelector('.search-input').value, 10) || 0,
                custom_img: tr.querySelector('.img-input').value 
            }).eq('name', placeName).eq('region', currentRegion);

            if (error) { alert('실패: ' + error.message); btnElement.disabled = false; btnElement.innerText = 'DB 반영'; } 
            else {
                btnElement.innerText = '완료 ✔'; btnElement.classList.replace('bg-gray-700', 'bg-green-600');
                setTimeout(() => { btnElement.innerText = 'DB 반영'; btnElement.classList.replace('bg-green-600', 'bg-gray-700'); btnElement.disabled = false; }, 2000);
                fetchPlaces();
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPlaces);
    </script>
</body>
</html>
