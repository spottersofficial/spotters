        function romanizeKorean(text) {
            const cho = ["g","kk","n","d","tt","r","m","b","pp","s","ss","","j","jj","ch","k","t","p","h"];
            const jung = ["a","ae","ya","yae","eo","e","yeo","ye","o","wa","wae","oe","yo","u","wo","we","wi","yu","eu","ui","i"];

            const dict = { 
                '크리스찬 디올': 'Christian Dior', '크리스찬디올': 'Christian Dior',
                '포인트 오브 뷰': 'Point of View', '포인트오브뷰': 'Point of View',

            let romanized = "";

                    romanized += syllable;
                } else {
                    romanized += result.charAt(i);
                }
            }
            
            return romanized.replace(/\b[a-z]/g, char => char.toUpperCase()).replace(/\s+/g, ' ').trim();
        }

        function setLanguage(lang) {
            currentLang = lang;
            
            const btnKr = document.getElementById('btn-kr');
            const btnEn = document.getElementById('btn-en');
            if(lang === 'KR') {
                btnKr.className = "bg-point text-white rounded-full px-2 py-1 shadow-sm transition-colors";
                btnEn.className = "px-2 py-1 hover:text-white transition-colors";
            } else {
                btnEn.className = "bg-point text-white rounded-full px-2 py-1 shadow-sm transition-colors";
                btnKr.className = "px-2 py-1 hover:text-white transition-colors";
            }

            document.getElementById('current-region-label').innerHTML = i18n[currentLang]['region_' + currentRegion];
            document.getElementById('desc-1').innerHTML = i18n[currentLang].desc_1;
            document.getElementById('desc-2-label').innerHTML = i18n[currentLang].desc_2;
            
            document.getElementById('dd-hongdae').innerText = i18n[currentLang]['region_홍대'];
            document.getElementById('dd-seongsu').innerText = i18n[currentLang]['region_성수'];
            document.getElementById('dd-nowon').innerText = i18n[currentLang]['region_노원'];
            document.getElementById('dd-magok').innerText = i18n[currentLang]['region_마곡'];
            document.getElementById('dd-jamsil').innerText = i18n[currentLang]['region_잠실'];
            document.getElementById('dd-itaewon').innerText = i18n[currentLang]['region_이태원'];
            document.getElementById('dd-euljiro').innerText = i18n[currentLang]['region_을지로'];
            document.getElementById('dd-apgujeong').innerText = i18n[currentLang]['region_압구정'];

            if (map) {
                renderSubwayMarker();
            }

            if (activeCategories.length > 0 && allPlacesData.length > 0) {
                renderCategoryTabs();
                switchTab(currentSelectedCategory || activeCategories[0]);
            }
        }

        function handleLogoClick() {
            logoClickCount++;
            if (logoClickCount === 1) logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
            if (logoClickCount === 5) {
                clearTimeout(logoClickTimer);
                logoClickCount = 0;
                openAdminAuth();
            }
        }

        async function openAdminAuth() {
            if (adminAccessToken) {
                document.getElementById('admin-dashboard').classList.remove('hidden');
                return;
            }
            const adminId = prompt('[ADMIN] 관리자 ID(이메일):');
            if (!adminId) return;
            const adminPwd = prompt('[ADMIN] 관리자 비밀번호:');
            if (!adminPwd) return;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: adminId, password: adminPwd });
            if (error) return alert('인증 실패');
            adminAccessToken = data.session.access_token;
            document.getElementById('admin-dashboard').classList.remove('hidden');
        }

        function toggleRegionMenu(event) {
            event.stopPropagation();
            document.getElementById('region-dropdown').classList.toggle('hidden');
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('region-dropdown');
            if (!dropdown.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function changeRegion(region, event) {
            if(event) event.stopPropagation();
            currentRegion = region;
            document.getElementById('region-dropdown').classList.add('hidden');
            document.getElementById('current-region-label').innerText = i18n[currentLang]['region_' + region];
            document.getElementById('admin-region-badge').innerText = region;
            
            if (map) {
                const coords = region === '성수' ? [127.0570, 37.5425] : 
                               region === '홍대' ? [126.922974, 37.556037] : 
                               region === '마곡' ? [126.836867, 37.558891] : 
                               region === '잠실' ? [127.104568, 37.514430] : 
                               region === '이태원' ? [126.993914, 37.534508] :
                               region === '을지로' ? [126.992219, 37.566251] :
                               region === '압구정' ? [127.040561, 37.527431] :
                               [127.063338, 37.656367];
                map.flyTo({ center: coords, zoom: 15.5 });
                renderSubwayMarker();
            }

            document.getElementById('admin-status').innerText = `[${region}] DB 로딩 중...`;
            document.getElementById('admin-status').className = 'text-point';
            document.getElementById('btn-download-csv').classList.add('hidden');

            allPlacesData = [];
            currentSelectedCategory = null;
            document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">${i18n[currentLang].loading}</div>`;
            document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${i18n[currentLang].loading}</td></tr>`;

            fetchPlaces();
        }

        function renderSubwayMarker() {
            if (subwayMarker) subwayMarker.remove();
            
            const data = SUBWAY_DATA[currentRegion];
            if (!data || !map) return;

            const el = document.createElement('div');
            el.className = 'flex flex-col items-center select-none pointer-events-none z-0 opacity-90';
            
            el.innerHTML = `
                <div class="relative w-[28px] h-[28px] flex items-center justify-center drop-shadow-sm bg-navy rounded-full border border-white">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM15.5 16L14 14.5H10L8.5 16H6.5L8.5 13.5V10C8.5 8.62 9.62 7.5 11 7.5H13C14.38 7.5 15.5 8.62 15.5 10V13.5L17.5 16H15.5ZM12 13.5C11.17 13.5 10.5 12.83 10.5 12C10.5 11.17 11.17 10.5 12 10.5C12.83 10.5 13.5 11.17 13.5 12C13.5 12.83 12.83 13.5 12 13.5Z" fill="white"/>
                    </svg>
                    <div class="absolute -bottom-0.5 -right-0.5 w-[9px] h-[9px] rounded-full border-[1.5px] border-white shadow-sm" style="background-color: ${data.color};"></div>
                </div>
                <div class="mt-1 flex flex-col items-center leading-tight">
                    <span class="text-[12px] font-bold text-[#333333] text-halo tracking-tight">${currentLang === 'EN' ? data.nameEn : data.name}</span>
                </div>
            `;

            subwayMarker = new maptilersdk.Marker({ element: el, anchor: 'center' })
                .setLngLat([data.lng, data.lat])
                .addTo(map);
        }

        function initMap() {
            const coords = currentRegion === '성수' ? [127.0570, 37.5425] : 
                           currentRegion === '홍대' ? [126.922974, 37.556037] : 
                           currentRegion === '마곡' ? [126.836867, 37.558891] : 
                           currentRegion === '잠실' ? [127.104568, 37.514430] : 
                           currentRegion === '이태원' ? [126.993914, 37.534508] :
                           currentRegion === '을지로' ? [126.992219, 37.566251] :
                           currentRegion === '압구정' ? [127.040561, 37.527431] :
                           [127.063338, 37.656367];
            map = new maptilersdk.Map({
                container: 'map',
                style: "dataviz-light",
                center: coords,
                zoom: 15.5,
                controls: false
            });

            map.on('style.load', () => {
                renderSubwayMarker();
            });
        }

        async function fetchPlaces() {
            try {
                if(!map) initMap();
                
                const { data, error } = await supabaseClient
                    .from('places')
                    .select('*')
                    .eq('region', currentRegion);

                if (error) throw error;
                
                if (!data || data.length === 0 || data.filter(d => d.no !== 0).length === 0) {
                     document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">${i18n[currentLang].no_data}</div>`;
                     allPlacesData = [];
                     updateMapMarkers([]);
                     renderAdminTableFromData(); 
                     return;
                }

                const configRow = data.find(d => d.no === 0 && d.name === 'CONFIG');
                if (configRow && configRow.extracted_kw) {
                    activeCategories = configRow.extracted_kw.split(',').map(s => s.trim());
                } else {
                    activeCategories = [...ALL_CATEGORIES];
                }

                allPlacesData = data.filter(d => d.no !== 0).sort((a, b) => {
                    if (a.type < b.type) return -1;
                    if (a.type > b.type) return 1;
                    return b.trend_score - a.trend_score;
                });

                renderCategoryTabs();
                updateAdminCategoryCheckboxes();
                renderAdminTableFromData(); 
                document.getElementById('admin-status').innerText = `[${currentRegion}] DB 로드 완료`;
                document.getElementById('admin-status').className = 'text-green-600 font-bold';

                if (allPlacesData.length > 0) {
                    document.getElementById('btn-download-csv').classList.remove('hidden');
                }

                if (activeCategories.length > 0) {
                    switchTab(currentSelectedCategory || activeCategories[0]);
                } else {
                    document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-sub bg-white py-4 rounded-xl shadow-sm border border-gray-100">${i18n[currentLang].no_cat}</div>`;
                    updateMapMarkers([]);
                }
            } catch (error) {
                console.error('Data Error:', error.message);
                document.getElementById('cards-container').innerHTML = `<div class="w-full text-center text-[12px] font-bold text-red-500 bg-white py-4 rounded-xl shadow-sm border border-red-100">오류가 발생했습니다: ${error.message}</div>`;
            }
        }

        function renderCategoryTabs() {
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            
            activeCategories.forEach(cat => {
                const icon = cat.includes('식당') ? '🍔' : cat.includes('카페') ? '☕' : '🛍️';
                const safeId = 'tab-' + cat.replace(/[\/\s]/g, '');
                const displayName = i18n[currentLang]['cat_' + cat] || cat;
                
                container.innerHTML += `
                    <button onclick="switchTab('${cat}')" id="${safeId}" class="btn-tab btn-inactive px-4 py-2 rounded-full text-[12px] font-bold shadow-sm flex items-center gap-1 whitespace-nowrap">
                        ${icon} ${displayName}
                    </button>
                `;
            });
        }

        function updateAdminCategoryCheckboxes() {
            document.querySelectorAll('.cat-checkbox').forEach(cb => {
                cb.checked = activeCategories.includes(cb.value);
            });
        }

        async function saveCategoryConfig(btnElement) {
            btnElement.innerText = '저장 중...';
            btnElement.disabled = true;

            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCats = Array.from(checkboxes).map(cb => cb.value).join(',');

            const { data } = await supabaseClient.from('places').select('id').eq('no', 0).eq('region', currentRegion);
            let opError;

            if (data && data.length > 0) {
                const { error } = await supabaseClient.from('places').update({ extracted_kw: selectedCats }).eq('no', 0).eq('region', currentRegion);
                opError = error;
            } else {
                const { error } = await supabaseClient.from('places').insert({
                    no: 0, region: currentRegion, name: 'CONFIG', extracted_kw: selectedCats, 
                    trend_score: 0, lat: 0, lng: 0, type: 'config', status: 'config'
                });
                opError = error;
            }

            if (opError) {
                alert('설정 저장 실패: ' + opError.message);
                btnElement.disabled = false;
                btnElement.innerText = '설정 저장';
            } else {
                btnElement.innerText = '완료 ✔';
                btnElement.classList.replace('bg-gray-800', 'bg-green-600');
                setTimeout(() => {
                    btnElement.innerText = '설정 저장';
                    btnElement.classList.replace('bg-green-600', 'bg-gray-800');
                    btnElement.disabled = false;
                }, 2000);
                fetchPlaces(); 
            }
        }

        function switchTab(selectedCategory) {
            currentSelectedCategory = selectedCategory; 
            activeCategories.forEach(cat => {
                const safeId = 'tab-' + cat.replace(/[\/\s]/g, '');
                const tabEl = document.getElementById(safeId);
                if (tabEl) {
                    if (cat === selectedCategory) {
                        tabEl.className = 'btn-tab btn-active px-4 py-2 rounded-full text-[12px] font-bold shadow-md flex items-center gap-1 whitespace-nowrap';
                    } else {
                        tabEl.className = 'btn-tab btn-inactive px-4 py-2 rounded-full text-[12px] font-bold shadow-sm flex items-center gap-1 whitespace-nowrap';
                    }
                }
            });

            const filteredPlaces = allPlacesData.filter(p => p.type === selectedCategory).slice(0, 10);
            updateMapMarkers(filteredPlaces);
            renderBottomCards(filteredPlaces);
        }

        function updateMapMarkers(places) {
            if (!map) return;
            currentMarkers.forEach(marker => marker.remove());
            currentMarkers = [];
            if (places.length === 0) return;

            const bounds = new maptilersdk.LngLatBounds();
            places.forEach((place, index) => {
                const el = document.createElement('div');
                const isTop3 = index < 3;
                el.className = `rank-marker ${isTop3 ? 'top-rank' : ''}`;
                el.innerHTML = `${index + 1}`;
                
                el.onclick = () => {
                    const card = document.getElementById(`card-${index}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        map.flyTo({ center: [place.lng, place.lat], zoom: 17.5 });
                    }
                };
                const marker = new maptilersdk.Marker({ element: el }).setLngLat([place.lng, place.lat]).addTo(map);
                currentMarkers.push(marker);
                bounds.extend([place.lng, place.lat]);
            });
            map.fitBounds(bounds, { padding: { top: 150, bottom: 250, left: 50, right: 50 }, maxZoom: 16.5, duration: 1000 });
        }

        function renderBottomCards(places) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            if (places.length === 0) return;

            places.forEach((place, index) => {
                const rankBadge = index < 3 ? 'bg-point text-white' : 'bg-navy text-white';
                const searchKw = place.extracted_kw ? place.extracted_kw : `${currentRegion} ${place.name}`;
                const blogLink = place.youtube_vid ? place.youtube_vid : `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(searchKw)}`;
                const imageSrc = place.custom_img ? place.custom_img : `https://picsum.photos/seed/${place.id}/400/300`;

                const rankText = i18n[currentLang].rank_format(index + 1);
                
                const displayName = currentLang === 'EN' ? romanizeKorean(place.name) : place.name;

                const cardHtml = `
                    <div id="card-${index}" onclick="panToMap(${place.lat}, ${place.lng})" class="snap-center shrink-0 w-[80%] sm:w-72 bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden flex flex-col cursor-pointer transform transition hover:-translate-y-1">
                        <div class="h-24 bg-gray-200 relative">
                            <img src="${imageSrc}" alt="${displayName}" class="absolute inset-0 w-full h-full object-cover">
                            <div class="absolute top-2 left-2 ${rankBadge} brand-title px-2.5 py-1 rounded-md text-[12px] font-bold shadow-md">
                                ${rankText}
                            </div>
                        </div>
                        
                        <div class="px-3 py-2.5 flex flex-col gap-1">
                            <h3 class="font-extrabold text-[15px] text-gray-900 truncate">${displayName}</h3>
                            <div class="flex justify-between items-end mt-1">
                                <div class="text-[10px] font-semibold text-sub">
                                    <span class="text-point font-bold brand-title mr-0.5">${i18n[currentLang].search_vol}</span> <span class="text-gray-900 font-black">${Number(place.trend_score).toLocaleString()}</span>
                                </div>
                                <a href="${blogLink}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();"
                                   class="text-[10px] font-bold bg-gray-100 text-gray-800 px-2.5 py-1.5 rounded hover:bg-gray-200 transition-colors">
                                   ${i18n[currentLang].blog_link}
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            initDragScroll(container);
        }

        function panToMap(lat, lng) {
            if (isDraggingCard) return; 
            if (!map) return;
            map.flyTo({ center: [lng, lat], zoom: 17.5, essential: true, offset: [0, 80] });
        }

        function initDragScroll(slider) {
            let isDown = false;
            let startX;
            let scrollLeft;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; isDraggingCard = false; slider.classList.add('cursor-grabbing');
                startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mouseup', () => {
                isDown = false; slider.classList.remove('cursor-grabbing');
                setTimeout(() => isDraggingCard = false, 50);
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault(); isDraggingCard = true; 
                const x = e.pageX - slider.offsetLeft;
                slider.scrollLeft = scrollLeft - (x - startX) * 1.5; 
            });
        }

        async function runBackendUpdate() {
            const btn = document.getElementById('admin-update-btn');
            const statusLabel = document.getElementById('admin-status');
            const tbody = document.getElementById('admin-table-body');
            const btnCsv = document.getElementById('btn-download-csv');
            
            btn.disabled = true;
            btn.classList.replace('bg-point', 'bg-gray-400');
            btnCsv.classList.add('hidden');
            statusLabel.innerText = `[${currentRegion}] 수집 및 분석 중... (최대 2분 소요)`;
            statusLabel.className = 'text-orange-500 animate-pulse font-bold';
            tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${currentRegion} 데이터를 수집 중입니다...</td></tr>`;

            try {
                const response = await fetch('https://mdpqzcwamhzxybldvctr.supabase.co/functions/v1/update-hotspots', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ region: currentRegion })
                });
                if (!response.ok) throw new Error((await response.json()).error);
                
                statusLabel.innerText = `[${currentRegion}] 데이터 수집 완료`;
                statusLabel.className = 'text-green-600 font-bold';
                
                fetchPlaces();
            } catch (error) {
                alert('🚨 업데이트 실패: ' + error.message);
                statusLabel.innerText = '오류 발생';
                statusLabel.className = 'text-red-600 font-bold';
            } finally {
                btn.disabled = false; btn.classList.replace('bg-gray-400', 'bg-point');
            }
        }

        function renderAdminTableFromData() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            
            if (allPlacesData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-medium">${currentRegion} 데이터가 없습니다. 우측 상단의 '선택 지역 데이터 재수집' 버튼을 누르세요.</td></tr>`;
                return;
            }

            allPlacesData.forEach(place => {
                const trHtml = `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-medium">${place.type}</td>
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-bold">${place.no}위</td>
                        <td class="px-6 py-3 whitespace-nowrap text-gray-900 truncate max-w-[120px]">${place.name}</td>
                        <td class="px-6 py-3 whitespace-nowrap"><input type="text" class="kw-input border border-gray-300 rounded px-2 py-1 w-28 text-sm text-blue-600 font-semibold focus:outline-none focus:border-point" value="${place.extracted_kw || ''}"></td>
                        <td class="px-6 py-3 whitespace-nowrap text-right"><input type="number" class="search-input border border-gray-300 rounded px-2 py-1 w-20 text-sm text-right font-bold text-point focus:outline-none focus:border-point" value="${place.trend_score || 0}"></td>
                        <td class="px-6 py-3 whitespace-nowrap"><input type="text" class="img-input border border-gray-300 rounded px-2 py-1 w-48 text-sm text-gray-600 focus:outline-none focus:border-point" value="${place.custom_img || ''}" placeholder="URL 붙여넣기"></td>
                        <td class="px-6 py-3 whitespace-nowrap text-center"><button onclick="saveManualEdits('${place.name.replace(/'/g, "\\'")}', this)" class="bg-gray-700 text-white text-xs px-3 py-1.5 rounded shadow-sm hover:bg-black transition-colors">DB 반영</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', trHtml);
            });
        }

        function downloadCSVFile() {
            if (allPlacesData.length === 0) return;
            
            // 💡 CSV 다운로드 시, 데이터를 카테고리별로 그룹화하고 그 안에서 순위별로 오름차순 정렬
            const sortedData = [...allPlacesData].sort((a, b) => {
                if (a.type < b.type) return -1;
                if (a.type > b.type) return 1;
                return a.no - b.no;
            });

            let csv = "분류,카테고리별 순위,상호명,적용키워드,검색량,대표이미지URL\n";
            sortedData.forEach(p => {
                csv += `${p.type},${p.type} ${p.no}위,"${p.name}","${p.extracted_kw || ''}",${p.trend_score},"${p.custom_img || ''}"\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", `spottr_ranking_${currentRegion}_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        async function saveManualEdits(placeName, btnElement) {
            const tr = btnElement.closest('tr');
            btnElement.innerText = '저장...'; btnElement.disabled = true;

            const { error } = await supabaseClient.from('places').update({ 
                extracted_kw: tr.querySelector('.kw-input').value, 
                trend_score: parseInt(tr.querySelector('.search-input').value, 10) || 0,
                custom_img: tr.querySelector('.img-input').value 
            }).eq('name', placeName).eq('region', currentRegion);

            if (error) { alert('실패: ' + error.message); btnElement.disabled = false; btnElement.innerText = 'DB 반영'; } 
            else {
                btnElement.innerText = '완료 ✔'; btnElement.classList.replace('bg-gray-700', 'bg-green-600');
                setTimeout(() => { btnElement.innerText = 'DB 반영'; btnElement.classList.replace('bg-green-600', 'bg-gray-700'); btnElement.disabled = false; }, 2000);
                fetchPlaces();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setLanguage('KR'); 
            fetchPlaces();
        });
    </script>
