<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>spottr - Real-time Trend Tracker</title>
    
    <link rel="icon" type="image/svg+xml" href="symbol-spottr-navy.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { navy: '#1A1F71', point: '#007BFF', main: '#333333', sub: '#888888', base: '#F8F9FA' },
                    fontFamily: { sans: ['Montserrat', 'Pretendard', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    
    <style>
        :root { --color-primary-navy: #1A1F71; --color-point-blue: #007BFF; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .brand-title { letter-spacing: -0.02em; }
        
        .rank-marker {
            width: 30px; height: 30px; background-color: var(--color-primary-navy); color: white;
            border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.2s;
        }
        .rank-marker.top-rank { background-color: var(--color-point-blue); }
        .rank-marker:hover { transform: scale(1.1); z-index: 50; }

        /* MapTiler 로고 및 컨트롤 강제 숨김 */
        .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { display: none !important; }
    </style>
</head>
<body class="relative text-main font-sans antialiased">

    <div id="map" class="absolute inset-0 z-0"></div>

    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between">
        <div>
            <header class="pointer-events-auto h-[64px] bg-navy flex items-center justify-between px-4 shadow-md w-full">
                <div class="flex items-center gap-3">
                    <img src="logo-spottr-header.svg" alt="spottr" class="h-7 sm:h-8 object-contain cursor-pointer" onclick="handleLogoClick()">
                    
                    <div class="flex flex-col justify-center border-l border-white/20 pl-3">
                        <button class="flex items-center gap-1 text-white text-[13px] font-bold hover:opacity-80 transition-opacity">
                            <svg class="w-3.5 h-3.5 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span>성수동</span>
                            <svg class="w-3 h-3 text-white/60 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="flex items-center gap-1 mt-0.5 text-[10px] text-white/70 font-bold brand-title tracking-wide">
                            <span class="text-point animate-pulse text-[8px]">●</span> LIVE
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="flex bg-white/10 rounded-full p-0.5 text-[10px] font-bold text-white/50">
                        <button class="bg-point text-white rounded-full px-2 py-1 shadow-sm transition-colors">KR</button>
                        <button class="px-2 py-1 hover:text-white transition-colors">EN</button>
                    </div>
                    <button class="text-white hover:opacity-80 transition-opacity focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </header>

            <div class="p-4 w-full max-w-md mx-auto pointer-events-auto">
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <button onclick="switchTab('식당')" id="tab-식당" class="btn-tab btn-active px-5 py-2 rounded-full text-[13px] font-bold shadow-sm">🍔 식당</button>
                    <button onclick="switchTab('카페')" id="tab-카페" class="btn-tab btn-inactive px-5 py-2 rounded-full text-[13px] font-bold shadow-sm">☕ 카페</button>
                    <button onclick="switchTab('쇼핑')" id="tab-쇼핑" class="btn-tab btn-inactive px-5 py-2 rounded-full text-[13px] font-bold shadow-sm">🛍️ 쇼핑</button>
                    <button onclick="switchTab('팝업/문화')" id="tab-팝업/문화" class="btn-tab btn-inactive px-5 py-2 rounded-full text-[13px] font-bold shadow-sm">🎟️ 문화</button>
                </div>
                <div id="error-msg" class="hidden mt-3 bg-red-50 text-red-600 text-xs font-bold p-3 rounded-md border border-red-100 shadow-sm text-center"></div>
            </div>
        </div>

        <div class="w-full pb-6 pointer-events-auto flex flex-col items-center">
            
            <div id="cards-container" class="flex gap-4 px-4 w-full overflow-x-auto no-scrollbar snap-x snap-mandatory pb-3">
                <div class="w-full text-center text-[13px] font-bold text-sub bg-white py-5 rounded-xl shadow-sm border border-gray-100">
                    데이터를 불러오는 중입니다...
                </div>
            </div>

            <div class="px-5 text-center mt-1 w-full max-w-md pointer-events-auto">
                <p class="text-[10.5px] text-gray-600 font-semibold tracking-tight leading-snug bg-white/80 backdrop-blur-md py-2 px-3 rounded-lg shadow-sm border border-white/50">
                    구글맵 평점과 네이버 실시간 검색량을 교차 검증하는 자동 로직으로,<br>
                    광고와 어뷰징이 배제된 <span class="text-point font-black">100% 리얼 핫플</span>만을 매일 선정합니다.
                </p>
                <p class="text-[10px] text-gray-500 font-medium mt-2 pb-2">
                    제휴 및 문의: <a href="mailto:admin@spottr.kr" class="font-bold text-navy hover:underline">admin@spottr.kr</a>
                </p>
            </div>
            
        </div>
    </div>

    <div id="admin-dashboard" class="hidden absolute inset-0 z-50 bg-base flex flex-col pointer-events-auto overflow-hidden">
        
        <div class="bg-navy px-6 py-4 flex justify-between items-center shadow-md shrink-0">
            <div>
                <h2 class="text-xl font-black text-white brand-title">spottr ADMIN DASHBOARD</h2>
                <p class="text-xs text-white/70 mt-1">네이버/구글 API 교차 검증 및 실시간 데이터 수집</p>
            </div>
            <button onclick="document.getElementById('admin-dashboard').classList.add('hidden')" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded text-sm font-bold transition-colors">
                닫기 ✕
            </button>
        </div>

        <div class="p-6 shrink-0 bg-white border-b border-gray-200 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div class="text-sm font-bold text-gray-800">
                상태: <span id="admin-status" class="text-point">대기 중</span>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="btn-download-csv" onclick="downloadCSVFile()" class="hidden bg-green-600 text-white font-bold py-2.5 px-4 rounded shadow-sm hover:bg-green-700 transition-colors text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    CSV 다운로드
                </button>
                <button id="admin-update-btn" onclick="runBackendUpdate()" class="flex-1 sm:flex-none bg-point text-white font-bold py-2.5 px-6 rounded shadow-sm hover:bg-blue-600 transition-colors text-sm flex items-center justify-center gap-2">
                    데이터 수집 및 DB 갱신
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-auto p-6">
            <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">카테고리</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">순위</th>
                            <th scope="col" class="px-6 py-3 text-left font-bold text-gray-500 uppercase tracking-wider">상호명</th>
                            <th scope="col" class="px-6 py-3 text-right font-bold text-gray-500 uppercase tracking-wider">구글 리뷰 수</th>
                            <th scope="col" class="px-6 py-3 text-right font-bold text-gray-500 uppercase tracking-wider">네이버 검색량</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-gray-500 font-medium">
                                우측 상단의 '데이터 수집' 버튼을 눌러 최신 지표를 생성하세요.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mdpqzcwamhzxybldvctr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_cBvE70DY9IG5SrNf01chWA_Yxn4pKSx';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        maptilersdk.config.apiKey = '0MQk1Z9FONFMeu7MkCDh';

        let allPlacesData = [];
        const categories = ['식당', '카페', '쇼핑', '팝업/문화'];
        let map;
        let currentMarkers = [];
        let currentCsvData = '';

        let logoClickCount = 0;
        let logoClickTimer = null;
        let adminAccessToken = '';

        function handleLogoClick() {
            logoClickCount++;
            if (logoClickCount === 1) {
                logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
            }
            if (logoClickCount === 5) {
                clearTimeout(logoClickTimer);
                logoClickCount = 0;
                openAdminAuth();
            }
        }

        async function openAdminAuth() {
            if (adminAccessToken) {
                document.getElementById('admin-dashboard').classList.remove('hidden');
                return;
            }
            const adminId = prompt('[ADMIN] 관리자 ID(이메일)를 입력하세요:');
            if (!adminId) return;
            const adminPwd = prompt('[ADMIN] 관리자 비밀번호를 입력하세요:');
            if (!adminPwd) return;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email: adminId, password: adminPwd });
            if (error) {
                alert('인증 실패: 등록된 계정이 아니거나 비밀번호가 일치하지 않습니다.');
                return;
            }
            adminAccessToken = data.session.access_token;
            document.getElementById('admin-dashboard').classList.remove('hidden');
        }

        async function runBackendUpdate() {
            const btn = document.getElementById('admin-update-btn');
            const statusLabel = document.getElementById('admin-status');
            const tbody = document.getElementById('admin-table-body');
            const btnCsv = document.getElementById('btn-download-csv');
            
            btn.disabled = true;
            btn.classList.replace('bg-point', 'bg-gray-400');
            btnCsv.classList.add('hidden');
            statusLabel.innerText = '수집 및 분석 중... (네이버 API 대기 적용, 최대 2분 소요)';
            statusLabel.className = 'text-orange-500 animate-pulse font-bold';
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-gray-500 font-medium">API 데이터를 실시간으로 수집하고 있습니다. 잠시만 기다려주세요...</td></tr>`;

            try {
                const response = await fetch('https://mdpqzcwamhzxybldvctr.supabase.co/functions/v1/update-hotspots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || '서버 오류 발생');
                }

                const result = await response.json();
                
                currentCsvData = result.debug_csv;
                renderAdminTable(currentCsvData);
                
                statusLabel.innerText = `수집 완료 (총 ${result.count}건 적재됨)`;
                statusLabel.className = 'text-green-600 font-bold';
                btnCsv.classList.remove('hidden');

                fetchPlaces();

            } catch (error) {
                alert('업데이트 실패: ' + error.message);
                statusLabel.innerText = '오류 발생';
                statusLabel.className = 'text-red-600 font-bold';
            } finally {
                btn.disabled = false;
                btn.classList.replace('bg-gray-400', 'bg-point');
            }
        }

        function downloadCSVFile() {
            if (!currentCsvData) return;
            const blob = new Blob(["\uFEFF" + currentCsvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            
            const dateStr = new Date().toISOString().slice(0, 10);
            link.setAttribute("download", `spottr_ranking_${dateStr}.csv`);
            
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderAdminTable(csvString) {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            if (!csvString) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">데이터가 없습니다.</td></tr>`;
                return;
            }

            const rows = csvString.trim().split('\n');
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i]) continue;
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 5) {
                    const category = cols[0].replace(/^"|"$/g, '');
                    const rank = cols[1];
                    const name = cols[2].replace(/^"|"$/g, '');
                    const reviews = cols[3];
                    const searches = cols[4];

                    const trHtml = `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-medium">${category}</td>
                            <td class="px-6 py-3 whitespace-nowrap text-gray-900 font-bold">${rank}위</td>
                            <td class="px-6 py-3 whitespace-nowrap text-gray-900 truncate max-w-[200px]" title="${name}">${name}</td>
                            <td class="px-6 py-3 whitespace-nowrap text-right text-gray-600">${Number(reviews).toLocaleString()}</td>
                            <td class="px-6 py-3 whitespace-nowrap text-right text-point font-bold">${Number(searches).toLocaleString()}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', trHtml);
                }
            }
        }

        function initMap() {
            map = new maptilersdk.Map({
                container: 'map',
                style: "dataviz-light",
                center: [127.0570, 37.5425],
                zoom: 15.5,
                controls: false
            });
        }

        async function fetchPlaces() {
            try {
                if(!map) initMap();
                const { data, error } = await supabaseClient
                    .from('places')
                    .select('*')
                    .order('type', { ascending: true })
                    .order('trend_score', { ascending: false }); 

                if (error) throw error;
                if (!data || data.length === 0) throw new Error("데이터가 존재하지 않습니다.");

                allPlacesData = data;
                switchTab('식당');
            } catch (error) {
                console.error('Data Error:', error.message);
            }
        }

        function switchTab(selectedCategory) {
            categories.forEach(cat => {
                const tabEl = document.getElementById(`tab-${cat}`);
                if (cat === selectedCategory) {
                    tabEl.className = 'btn-tab btn-active px-5 py-2 rounded-full text-[13px] font-bold shadow-md';
                } else {
                    tabEl.className = 'btn-tab btn-inactive px-5 py-2 rounded-full text-[13px] font-bold shadow-sm';
                }
            });

            const filteredPlaces = allPlacesData.filter(p => p.type === selectedCategory).slice(0, 10);
            updateMapMarkers(filteredPlaces);
            renderBottomCards(filteredPlaces);
        }

        function updateMapMarkers(places) {
            if (!map) return;
            currentMarkers.forEach(marker => marker.remove());
            currentMarkers = [];
            if (places.length === 0) return;

            const bounds = new maptilersdk.LngLatBounds();
            places.forEach((place, index) => {
                const el = document.createElement('div');
                const isTop3 = index < 3;
                el.className = `rank-marker ${isTop3 ? 'top-rank' : ''}`;
                el.innerHTML = `${index + 1}`;
                
                el.onclick = () => {
                    const card = document.getElementById(`card-${index}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        map.flyTo({ center: [place.lng, place.lat], zoom: 17.5 });
                    }
                };

                const marker = new maptilersdk.Marker({ element: el })
                    .setLngLat([place.lng, place.lat])
                    .addTo(map);
                
                currentMarkers.push(marker);
                bounds.extend([place.lng, place.lat]);
            });
            map.fitBounds(bounds, { padding: { top: 150, bottom: 250, left: 50, right: 50 }, maxZoom: 16.5, duration: 1000 });
        }

        function renderBottomCards(places) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            if (places.length === 0) return;

            places.forEach((place, index) => {
                const rankBadge = index < 3 ? 'bg-point text-white' : 'bg-navy text-white';
                const blogLink = place.youtube_vid ? place.youtube_vid : `https://search.naver.com/search.naver?where=blog&query=성수동+${encodeURIComponent(place.name)}`;
                const imageSrc = place.custom_img ? place.custom_img : `https://picsum.photos/seed/${place.id}/400/300`;

                const cardHtml = `
                    <div id="card-${index}" onclick="panToMap(${place.lat}, ${place.lng})" class="snap-center shrink-0 w-[85%] sm:w-80 bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden flex flex-col cursor-pointer transform transition hover:-translate-y-1">
                        <div class="h-36 bg-gray-200 relative">
                            <img src="${imageSrc}" alt="${place.name}" class="absolute inset-0 w-full h-full object-cover">
                            <div class="absolute top-3 left-3 ${rankBadge} brand-title px-3 py-1.5 rounded-md text-[13px] font-bold shadow-md">
                                ${index + 1}위
                            </div>
                        </div>
                        
                        <div class="p-4 flex flex-col gap-1.5">
                            <h3 class="font-extrabold text-[17px] text-gray-900 truncate">${place.name}</h3>
                            
                            <div class="flex justify-between items-end mt-2">
                                <div class="text-[11px] font-semibold text-sub">
                                    <span class="text-point font-bold brand-title mr-1">최근 30일 검색량</span> <span class="text-gray-900 font-black">${Number(place.trend_score).toLocaleString()}건</span>
                                </div>
                                
                                <a href="${blogLink}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();"
                                   class="text-[11px] font-bold bg-gray-100 text-gray-800 px-3 py-1.5 rounded hover:bg-gray-200 transition-colors">
                                   네이버 블로그 ↗
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        function panToMap(lat, lng) {
            if (!map) return;
            map.flyTo({ center: [lng, lat], zoom: 17.5, essential: true, offset: [0, 80] });
        }

        document.addEventListener('DOMContentLoaded', fetchPlaces);
    </script>
</body>
</html>
